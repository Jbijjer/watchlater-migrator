<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Watch Later Triage</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a;padding:1rem;font-size:14px}
#topbar{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
h1{font-size:1rem;font-weight:600;flex:1}
#drop-zone{border:2px dashed #ccc;border-radius:8px;padding:2rem;text-align:center;color:#888;margin-bottom:1rem;cursor:pointer;transition:border-color .2s}
#drop-zone.active{border-color:#1D9E75;color:#1D9E75}
#drop-zone.hidden{display:none}
#toolbar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:.75rem}
#toolbar input,#toolbar select{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff}
#search{flex:1;min-width:160px}
#channel-sel{max-width:190px}
.cb-wrap{display:flex;align-items:center;gap:4px;font-size:12px;color:#555;cursor:pointer;user-select:none}
#stats{font-size:12px;color:#888;margin-left:auto;white-space:nowrap}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0}
thead th{padding:7px 10px;text-align:left;font-size:12px;font-weight:600;color:#555;background:#f9f9f9;border-bottom:1px solid #e0e0e0;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{background:#f0f0f0}
thead th .sa{margin-left:4px;opacity:.4}
thead th.sorted .sa{opacity:1}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#f0f7ff}
tbody tr.kept{background:#E1F5EE}
tbody tr.deleted{background:#fdf0f0}
tbody tr.selected{outline:2px solid #378ADD;outline-offset:-2px}
td{padding:6px 10px;font-size:13px;border-bottom:1px solid #f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
td.tc{max-width:340px}
td.cc{max-width:160px}
.badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:500}
.b-keep{background:#E1F5EE;color:#0F6E56}
.b-del{background:#fde8e8;color:#993c1d}
.b-none{background:#f0f0f0;color:#888}
a.yl{font-size:11px;color:#555;text-decoration:none;padding:1px 5px;border:1px solid #ddd;border-radius:4px}
a.yl:hover{background:#eee}
#tw{max-height:65vh;overflow-y:auto;border-radius:8px}
#footer{margin-top:.75rem;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button{padding:7px 13px;border:1px solid #ccc;border-radius:6px;background:#fff;font-size:13px;cursor:pointer}
button:hover{background:#f0f0f0}
button:disabled{opacity:.4;cursor:default}
.bk{background:#1D9E75;border-color:#1D9E75;color:#fff}.bk:hover{background:#18856a}
.bd{background:#c0392b;border-color:#c0392b;color:#fff}.bd:hover{background:#a93226}
.be{background:#2980b9;border-color:#2980b9;color:#fff}.be:hover{background:#2471a3}
#sc{font-size:13px;color:#555}
#ss{font-size:12px;color:#888;margin-left:auto}
#mw{position:relative}
#db{padding:5px 9px;font-size:16px;line-height:1;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer}
#dd{display:none;position:absolute;right:0;top:110%;background:#fff;border:1px solid #ccc;border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:100;min-width:150px}
#dd.open{display:block}
#dd button{width:100%;text-align:left;border:none;border-radius:0;padding:9px 14px;font-size:13px;color:#c0392b}
#dd button:hover{background:#fdf0f0}
</style>
</head>
<body>
<div id="topbar">
  <h1>Watch Later Triage — <span id="tc2"></span></h1>
  <div id="mw">
    <button id="db" onclick="toggleMenu()">⋯</button>
    <div id="dd">
      <button onclick="resetAll()">↺ Reset all status</button>
    </div>
  </div>
</div>

<div id="drop-zone" onclick="document.getElementById('file-input').click()">
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadFile(this)">
  <p style="font-size:1rem;margin-bottom:.5rem">📂 Drop your <code>enriched.json</code> here</p>
  <p style="font-size:13px">or click to browse — generated by <code>2_enrich_metadata.py</code></p>
</div>

<div id="toolbar" style="display:none">
  <input id="search" placeholder="Search title or channel..." oninput="render()">
  <select id="channel-sel" onchange="render()"><option value="">All channels</option></select>
  <select id="year-sel" onchange="render()"><option value="">All years</option></select>
  <label class="cb-wrap"><input type="checkbox" id="show-keep" onchange="render()"> Show To Keep</label>
  <label class="cb-wrap"><input type="checkbox" id="show-del" onchange="render()"> Show Deleted</label>
  <span id="stats"></span>
</div>

<div id="tw" style="display:none">
<table>
  <thead><tr>
    <th onclick="sortBy('title')" id="th-title">Title <span class="sa">↕</span></th>
    <th onclick="sortBy('channel')" id="th-channel">Channel <span class="sa">↕</span></th>
    <th onclick="sortBy('published')" id="th-published">Year <span class="sa">↕</span></th>
    <th onclick="sortBy('duration')" id="th-duration">Duration <span class="sa">↕</span></th>
    <th onclick="sortBy('status')" id="th-status">Status <span class="sa">↕</span></th>
    <th></th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<div id="footer" style="display:none">
  <button class="bk" id="btn-keep" onclick="setStatus('keep')" disabled>✓ Add to keepers</button>
  <button class="bd" id="btn-del" onclick="setStatus('deleted')" disabled>✕ Add to deleted</button>
  <button class="be" onclick="exportJSON()">⬇ Generate keepers JSON</button>
  <span id="sc"></span>
  <span id="ss"></span>
</div>

<script>
let VIDEOS=[], status={}, selected=new Set();
let sortCol='published', sortDir=1, lastIdx=null, visibleIds=[];

function loadFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      VIDEOS = JSON.parse(e.target.result);
      initUI();
    } catch(err) {
      alert('Invalid JSON file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// Also support drag & drop
const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('active'); });
dz.addEventListener('dragleave', () => dz.classList.remove('active'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('active');
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { try { VIDEOS = JSON.parse(ev.target.result); initUI(); } catch(err) { alert('Invalid JSON'); } };
  reader.readAsText(file);
});

function initUI() {
  document.getElementById('drop-zone').classList.add('hidden');
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('tw').style.display = 'block';
  document.getElementById('footer').style.display = 'flex';
  document.getElementById('tc2').textContent = VIDEOS.length + ' videos';

  const channels = [...new Set(VIDEOS.map(v => v.channel||'').filter(Boolean))].sort();
  const years = [...new Set(VIDEOS.map(v => (v.published||'').slice(0,4)).filter(Boolean))].sort();
  const chSel = document.getElementById('channel-sel');
  channels.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; chSel.appendChild(o); });
  const ySel = document.getElementById('year-sel');
  years.forEach(y => { const o = document.createElement('option'); o.value=y; o.textContent=y; ySel.appendChild(o); });

  document.getElementById('th-published').classList.add('sorted');
  document.getElementById('th-published').querySelector('.sa').textContent = '↑';
  render();
}

function dts(d) { if(!d)return 0; const p=d.split(':').map(Number); return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+(p[1]||0); }

function sortBy(col) {
  if(sortCol===col) sortDir*=-1; else { sortCol=col; sortDir=1; }
  document.querySelectorAll('thead th').forEach(th=>th.classList.remove('sorted'));
  const th=document.getElementById('th-'+col);
  if(th){th.classList.add('sorted');th.querySelector('.sa').textContent=sortDir===1?'↑':'↓';}
  render();
}

function getFiltered() {
  const q=document.getElementById('search').value.toLowerCase();
  const ch=document.getElementById('channel-sel').value;
  const yr=document.getElementById('year-sel').value;
  const sk=document.getElementById('show-keep').checked;
  const sd=document.getElementById('show-del').checked;
  return VIDEOS.filter(v => {
    const st=status[v.id]||'';
    if(st==='keep'&&!sk) return false;
    if(st==='deleted'&&!sd) return false;
    if(q&&!v.title.toLowerCase().includes(q)&&!(v.channel||'').toLowerCase().includes(q)) return false;
    if(ch&&v.channel!==ch) return false;
    if(yr&&(v.published||'').slice(0,4)!==yr) return false;
    return true;
  });
}

function getSorted(list) {
  return [...list].sort((a,b) => {
    let av,bv;
    if(sortCol==='duration'){av=dts(a.duration);bv=dts(b.duration);}
    else if(sortCol==='status'){av=status[a.id]||'';bv=status[b.id]||'';}
    else{av=(a[sortCol]||'').toLowerCase();bv=(b[sortCol]||'').toLowerCase();}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
}

function render() {
  const filtered=getSorted(getFiltered());
  visibleIds=filtered.map(v=>v.id);
  const kc=Object.values(status).filter(s=>s==='keep').length;
  const dc=Object.values(status).filter(s=>s==='deleted').length;
  document.getElementById('stats').textContent=filtered.length+' / '+VIDEOS.length+' shown';
  document.getElementById('ss').textContent=`✓ ${kc} keepers · ✕ ${dc} deleted`;
  const siv=[...selected].filter(id=>visibleIds.includes(id));
  document.getElementById('sc').textContent=siv.length?siv.length+' selected':'';
  document.getElementById('btn-keep').disabled=siv.length===0;
  document.getElementById('btn-del').disabled=siv.length===0;
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  filtered.forEach((v,idx) => {
    const st=status[v.id]||'';
    const tr=document.createElement('tr');
    if(st==='keep') tr.classList.add('kept');
    else if(st==='deleted') tr.classList.add('deleted');
    if(selected.has(v.id)) tr.classList.add('selected');
    const badge=st==='keep'?'<span class="badge b-keep">To Keep</span>':st==='deleted'?'<span class="badge b-del">Deleted</span>':'<span class="badge b-none">—</span>';
    tr.innerHTML=`<td class="tc" title="${v.title}">${v.title}</td><td class="cc" title="${v.channel||''}">${v.channel||''}</td><td>${(v.published||'').slice(0,4)}</td><td>${v.duration||''}</td><td>${badge}</td><td><a class="yl" href="https://youtube.com/watch?v=${v.id}" target="_blank" onclick="event.stopPropagation()">YT ↗</a></td>`;
    tr.addEventListener('click', e => {
      if(e.target.tagName==='A') return;
      if(e.shiftKey&&lastIdx!==null){const f=Math.min(lastIdx,idx),t=Math.max(lastIdx,idx);for(let i=f;i<=t;i++)selected.add(visibleIds[i]);}
      else if(e.ctrlKey||e.metaKey){if(selected.has(v.id))selected.delete(v.id);else selected.add(v.id);}
      else{if(selected.size===1&&selected.has(v.id))selected.clear();else{selected.clear();selected.add(v.id);}}
      lastIdx=idx; render();
    });
    tbody.appendChild(tr);
  });
}

function setStatus(st){selected.forEach(id=>{status[id]=st;});selected.clear();render();}
function resetAll(){Object.keys(status).forEach(k=>delete status[k]);selected.clear();closeMenu();render();}
function exportJSON(){
  const keepers=VIDEOS.filter(v=>status[v.id]==='keep');
  if(!keepers.length){alert('No keepers selected!');return;}
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(keepers,null,2)],{type:'application/json'}));
  a.download='keepers.json';a.click();
}
function toggleMenu(){document.getElementById('dd').classList.toggle('open');}
function closeMenu(){document.getElementById('dd').classList.remove('open');}
document.addEventListener('click',e=>{if(!document.getElementById('mw').contains(e.target))closeMenu();});
</script>
</body>
</html>
